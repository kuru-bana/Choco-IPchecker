<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>国別IP ブラウザ — Choco-ip 位置情報チェッカー</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        .site-header {
            position: sticky; top: 0; z-index: 200;
            background: rgba(15,23,42,0.97); backdrop-filter: blur(8px);
            border-bottom: 1px solid #1e293b;
            padding: 12px 24px;
            display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
        }
        .back-link { color: #64748b; font-size: 0.85rem; text-decoration: none; white-space: nowrap; }
        .back-link:hover { color: #94a3b8; }
        h1 {
            font-size: 1.2rem; font-weight: 700; white-space: nowrap;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-spacer { flex: 1; }
        #searchBox {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            color: #e2e8f0; font-size: 0.85rem; padding: 8px 14px; width: 220px; outline: none;
            transition: border-color 0.2s;
        }
        #searchBox::placeholder { color: #475569; }
        #searchBox:focus { border-color: #60a5fa; }
        .stat-badge {
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            color: #64748b; font-size: 0.75rem; padding: 5px 12px; white-space: nowrap;
        }

        .main { padding: 28px 24px; max-width: 1280px; margin: 0 auto; }

        .continent-divider {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.14em; color: #64748b;
            border-bottom: 1px solid #1e293b; padding-bottom: 6px;
            margin: 36px 0 16px;
        }
        .continent-divider:first-child { margin-top: 0; }

        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .country-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            text-decoration: none;
            display: flex; flex-direction: column; gap: 6px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .country-card:hover {
            border-color: #60a5fa;
            box-shadow: 0 4px 20px rgba(96,165,250,0.12);
        }
        .country-card.hidden { display: none; }

        .card-flag { font-size: 2rem; line-height: 1.2; }
        .card-name-ja { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; margin-top: 2px; }
        .card-name-en { font-size: 0.72rem; color: #64748b; }
        .card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .card-badge {
            background: #0f172a; border: 1px solid #1e293b; border-radius: 4px;
            color: #475569; font-size: 0.65rem; padding: 2px 8px;
        }

        .no-results {
            color: #475569; font-size: 0.9rem; text-align: center; padding: 40px 0;
        }

        .loading-block {
            background: #1e293b; border: 1px solid #334155; border-radius: 14px;
            padding: 48px; text-align: center; margin: 48px 0;
        }
        .spinner {
            display: inline-block; width: 22px; height: 22px;
            border: 3px solid #334155; border-top-color: #60a5fa;
            border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar-wrap { background: #0f172a; border-radius: 6px; height: 6px; margin: 16px auto; max-width: 320px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #60a5fa, #a78bfa); height: 100%; border-radius: 6px; transition: width 0.5s; }
        .loading-note { font-size: 0.8rem; color: #475569; margin-top: 10px; }
        .ip-ver-btns { display: flex; gap: 4px; }
        .ip-ver-btn {
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            color: #64748b; font-size: 0.72rem; padding: 5px 10px; white-space: nowrap;
            cursor: pointer; transition: all 0.15s; line-height: 1;
        }
        .ip-ver-btn:hover { border-color: #475569; color: #94a3b8; }
        .ip-ver-btn.act-all { border-color: #475569; color: #94a3b8; background: #263045; }
        .ip-ver-btn.act-v4  { border-color: #3b82f6; color: #60a5fa; background: #1e3a5f; }
        .ip-ver-btn.act-v6  { border-color: #8b5cf6; color: #a78bfa; background: #2e1a5f; }
        .card-badge-v6 {
            background: #2e1a5f; border: 1px solid #4c2a9f; border-radius: 4px;
            color: #a78bfa; font-size: 0.65rem; padding: 2px 8px;
        }
    </style>
</head>
<body>

<header class="site-header">
    <a href="/" class="back-link">← トップへ</a>
    <h1>国別IP ブラウザ</h1>
    <div class="header-spacer"></div>
    <input type="search" id="searchBox" placeholder="国名で検索..." disabled>
    <div class="ip-ver-btns">
        <button class="ip-ver-btn act-all" id="fAll" onclick="setVerFilter('all')">全て</button>
        <button class="ip-ver-btn" id="fV4" onclick="setVerFilter('v4')">IPv4のみ</button>
        <button class="ip-ver-btn" id="fV6" onclick="setVerFilter('v6')">IPv6あり</button>
    </div>
    <span class="stat-badge" id="statBadge">スキャン中...</span>
</header>

<main class="main" id="main">
    <div class="loading-block" id="loadingBlock">
        <div><span class="spinner"></span><span id="loadingMsg" style="font-size:1rem;color:#94a3b8;">GeoLite2-City IPv4/IPv6空間をスキャン中...</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="loading-note">国・地域・都市を自動検出しています。初回のみ時間がかかります。</div>
    </div>
</main>

<script>
    const CONTINENT_NAMES = {
        AS:'アジア', EU:'ヨーロッパ', NA:'北アメリカ',
        SA:'南アメリカ', OC:'オセアニア', AF:'アフリカ', AN:'南極',
        ZZ:'その他の地域',
    };

    function flag(code) {
        if (!code || code.length !== 2) return '🌐';
        return String.fromCodePoint(...code.toUpperCase().split('').map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
    }

    async function pollUntilReady() {
        while (true) {
            try {
                const s = await fetch('/api/city-explore/status').then(r => r.json());
                document.getElementById('progressBar').style.width = s.progress + '%';
                if (s.ready) { await loadAll(); return; }
                document.getElementById('loadingMsg').textContent = `スキャン中... ${s.progress}%`;
            } catch(e) {}
            await new Promise(r => setTimeout(r, 800));
        }
    }

    async function loadAll() {
        const res  = await fetch('/api/city-explore/all');
        const json = await res.json();
        document.getElementById('loadingBlock').style.display = 'none';
        render(json.countries, json.stats);
    }

    function render(countries, stats) {
        const main = document.getElementById('main');
        main.innerHTML = '';

        document.getElementById('statBadge').textContent = `${stats.countries} 国 / ${stats.regions} 地域`;
        document.getElementById('searchBox').disabled = false;

        let lastContinent = '__NONE__';
        let currentGrid = null;

        for (const country of countries) {
            const cont = country.continent || 'ZZ';
            if (cont !== lastContinent) {
                lastContinent = cont;
                const d = document.createElement('div');
                d.className = 'continent-divider';
                d.textContent = CONTINENT_NAMES[cont] || cont;
                main.appendChild(d);
                currentGrid = document.createElement('div');
                currentGrid.className = 'country-grid';
                main.appendChild(currentGrid);
            }

            // Count v4/v6 records for this country
            let v4c = 0, v6c = 0;
            for (const reg of country.regions || []) {
                for (const ip of reg.ips || []) {
                    if (ip.ip && ip.ip.includes(':')) v6c++; else v4c++;
                }
            }

            const card = document.createElement('a');
            card.className = 'country-card';
            card.href = `/city-explore/${country.code}`;
            card.dataset.search = `${country.name_ja} ${country.name_en} ${country.code}`.toLowerCase();
            card.dataset.country = country.code;
            card.dataset.v4 = v4c;
            card.dataset.v6 = v6c;
            card.innerHTML = `
                <div class="card-flag">${flag(country.code)}</div>
                <div class="card-name-ja">${country.name_ja}</div>
                <div class="card-name-en">${country.name_en}</div>
                <div class="card-badges">
                    <span class="card-badge">${country.region_count} 地域</span>
                    <span class="card-badge">${country.ip_count} IP</span>
                    ${v6c > 0 ? `<span class="card-badge card-badge-v6">IPv6 ${v6c}</span>` : ''}
                </div>
            `;
            currentGrid.appendChild(card);
        }

        setupSearch();
    }

    function looksLikeIp(s) {
        if (/^\d{1,3}(\.\d{1,3}){1,3}$/.test(s)) return true;
        if (s.includes(':') && /^[0-9a-fA-F:]{2,39}$/.test(s)) return true;
        return false;
    }

    let verFilter = 'all';

    function setVerFilter(v) {
        verFilter = v;
        document.getElementById('fAll').className = 'ip-ver-btn' + (v === 'all' ? ' act-all' : '');
        document.getElementById('fV4').className  = 'ip-ver-btn' + (v === 'v4'  ? ' act-v4'  : '');
        document.getElementById('fV6').className  = 'ip-ver-btn' + (v === 'v6'  ? ' act-v6'  : '');
        applyFilters();
    }

    function applyFilters() {
        const q = document.getElementById('searchBox').value.trim().toLowerCase();
        document.querySelectorAll('.country-card').forEach(card => {
            let show = true;
            if (q && !card.dataset.search.includes(q)) show = false;
            if (verFilter === 'v4' && parseInt(card.dataset.v4 || 0) === 0) show = false;
            if (verFilter === 'v6' && parseInt(card.dataset.v6 || 0) === 0) show = false;
            card.classList.toggle('hidden', !show);
        });
    }

    function setupSearch() {
        const box = document.getElementById('searchBox');
        box.placeholder = '国名・IPv4/IPv6で検索...';
        let ipTimer = null;

        box.addEventListener('input', function() {
            const q = this.value.trim();

            // Remove IP result banner
            const banner = document.getElementById('ipResult');
            if (banner) banner.remove();

            // Combined filter (text + version)
            applyFilters();

            // IP lookup: trigger when input looks like an IP (v4 or v6)
            clearTimeout(ipTimer);
            if (looksLikeIp(q)) {
                ipTimer = setTimeout(() => lookupIP(q), 450);
            }
        });
    }

    async function lookupIP(ip) {
        const existing = document.getElementById('ipResult');
        if (existing) existing.remove();

        try {
            const res = await fetch(`/api/check/light/${encodeURIComponent(ip)}`);
            const data = await res.json();
            const main = document.getElementById('main');

            const banner = document.createElement('div');
            banner.id = 'ipResult';

            if (data.error) {
                banner.style.cssText = 'background:#1c0a0a;border:1px solid #7f1d1d;border-radius:12px;padding:14px 20px;margin-bottom:20px;color:#fca5a5;font-size:0.9rem;';
                banner.innerHTML = `⚠️ <code style="font-family:monospace;background:#2d0808;padding:2px 6px;border-radius:4px;">${ip}</code> — ${data.error}`;
            } else {
                const f = flag(data.country);
                banner.style.cssText = 'background:#0d1e35;border:1px solid #1e4a7a;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;';
                banner.innerHTML = `
                    <span style="font-size:1.8rem;line-height:1">${f}</span>
                    <div style="flex:1;min-width:0">
                        <div style="font-size:0.7rem;color:#60a5fa;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">IP 検索結果</div>
                        <div style="font-size:0.95rem;font-weight:700;color:#e2e8f0">
                            <code style="font-family:monospace;color:#60a5fa;font-size:0.9rem">${ip}</code>
                            &nbsp;→&nbsp; ${data.country_name}
                            <span style="color:#475569;font-size:0.78rem;margin-left:4px">(${data.country})</span>
                        </div>
                    </div>
                    <a href="/city-explore/${data.country}" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;text-decoration:none;border-radius:8px;padding:9px 18px;font-size:0.83rem;font-weight:600;white-space:nowrap;flex-shrink:0;">この国を見る →</a>
                `;

                // Highlight matching country card only
                document.querySelectorAll('.country-card').forEach(card => {
                    card.classList.toggle('hidden', card.dataset.country !== data.country);
                });
            }

            main.prepend(banner);
        } catch(e) {}
    }

    pollUntilReady();
</script>
</body>
</html>
