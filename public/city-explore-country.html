<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>国別IP ブラウザ — Choco-ip 位置情報チェッカー</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        .site-header {
            position: sticky; top: 0; z-index: 200;
            background: rgba(15,23,42,0.97); backdrop-filter: blur(8px);
            border-bottom: 1px solid #1e293b;
            padding: 12px 24px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .back-link { color: #64748b; font-size: 0.85rem; text-decoration: none; white-space: nowrap; }
        .back-link:hover { color: #94a3b8; }
        .header-flag { font-size: 1.6rem; line-height: 1; }
        h1 {
            font-size: 1.2rem; font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .h-en { font-size: 0.78rem; color: #475569; font-weight: 400; }
        .header-spacer { flex: 1; }
        #searchBox {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            color: #e2e8f0; font-size: 0.85rem; padding: 8px 14px; width: 220px; outline: none;
            transition: border-color 0.2s;
        }
        #searchBox::placeholder { color: #475569; }
        #searchBox:focus { border-color: #60a5fa; }
        .stat-badge {
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            color: #64748b; font-size: 0.75rem; padding: 5px 12px; white-space: nowrap;
        }
        .ip-ver-btns { display: flex; gap: 4px; }
        .ip-ver-btn {
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            color: #64748b; font-size: 0.72rem; padding: 5px 10px; white-space: nowrap;
            cursor: pointer; transition: all 0.15s; line-height: 1;
        }
        .ip-ver-btn:hover { border-color: #475569; color: #94a3b8; }
        .ip-ver-btn.act-all { border-color: #475569; color: #94a3b8; background: #263045; }
        .ip-ver-btn.act-v4  { border-color: #3b82f6; color: #60a5fa; background: #1e3a5f; }
        .ip-ver-btn.act-v6  { border-color: #8b5cf6; color: #a78bfa; background: #2e1a5f; }

        .main { padding: 24px; max-width: 1280px; margin: 0 auto; }

        .notice-block {
            border-radius: 14px; padding: 40px; text-align: center; margin: 48px 0;
        }
        .notice-block.loading { background: #1e293b; border: 1px solid #334155; }
        .notice-block.error   { background: #1c0a0a; border: 1px solid #7f1d1d; color: #fca5a5; }
        .notice-block.warn    { background: #1a1500; border: 1px solid #78610a; color: #fde68a; }

        .spinner {
            display: inline-block; width: 22px; height: 22px;
            border: 3px solid #334155; border-top-color: #60a5fa;
            border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar-wrap { background: #0f172a; border-radius: 6px; height: 6px; margin: 16px auto; max-width: 320px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #60a5fa, #a78bfa); height: 100%; border-radius: 6px; transition: width 0.5s; }
        .notice-sub { font-size: 0.8rem; color: #475569; margin-top: 10px; }

        .region-divider {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.12em; color: #60a5fa;
            border-bottom: 1px solid #1e3a5f; padding-bottom: 6px;
            margin: 32px 0 12px; display: flex; align-items: center; gap: 10px;
        }
        .region-divider:first-child { margin-top: 0; }
        .region-divider-count { font-size: 0.65rem; color: #334155; letter-spacing: 0; font-weight: 400; text-transform: none; }

        .pref-block { margin-bottom: 6px; }
        .pref-block.hidden { display: none; }
        .pref-row {
            display: flex; align-items: center; gap: 10px;
            background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 12px 16px; cursor: pointer; user-select: none;
            transition: border-color 0.15s;
        }
        .pref-row:hover { border-color: #475569; }
        .pref-row.open { border-radius: 10px 10px 0 0; border-color: #475569; border-bottom-color: transparent; }
        .p-arrow { font-size: 0.65rem; color: #475569; transition: transform 0.2s; flex-shrink: 0; }
        .p-arrow.open { transform: rotate(90deg); }
        .p-name-ja { font-size: 1rem; font-weight: 700; color: #e2e8f0; }
        .p-name-en { font-size: 0.75rem; color: #64748b; }
        .p-spacer { flex: 1; }
        .p-badge {
            background: #0f172a; border: 1px solid #334155; border-radius: 4px;
            color: #64748b; font-size: 0.7rem; padding: 3px 10px; white-space: nowrap;
        }
        .pref-body { display: none; overflow: hidden; }
        .pref-body.open {
            display: block; border: 1px solid #475569; border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #161f30; }
        thead th {
            background: #0d1625; color: #64748b;
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
            padding: 10px 14px; text-align: left; white-space: nowrap;
            border-bottom: 1px solid #1e293b;
        }
        tbody tr { border-top: 1px solid #1a2540; transition: background 0.1s; }
        tbody tr:first-child { border-top: none; }
        tbody tr:hover { background: #1e2d45; }
        tbody tr.hidden-row { display: none; }
        tbody tr.hidden-ver { display: none; }
        tbody tr.hl { background: rgba(96,165,250,0.08); }
        tbody td { padding: 10px 14px; font-size: 0.85rem; vertical-align: middle; }
        .td-ip { font-family: 'Courier New', monospace; color: #60a5fa; white-space: nowrap; font-weight: 700; font-size: 0.82rem; }
        .td-city-ja { color: #e2e8f0; font-weight: 600; }
        .td-city-en { color: #64748b; font-size: 0.78rem; }
        .td-pref { color: #94a3b8; }
        .td-post { color: #64748b; font-family: 'Courier New', monospace; font-size: 0.8rem; }
        .td-tz { color: #a78bfa; font-size: 0.8rem; white-space: nowrap; }
        .td-coord { font-family: 'Courier New', monospace; color: #64748b; font-size: 0.78rem; white-space: nowrap; }
        .td-acc { color: #fbbf24; font-size: 0.78rem; }
        .td-org { color: #94a3b8; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.8rem; }
        .td-asn { font-family: 'Courier New', monospace; color: #34d399; font-size: 0.78rem; white-space: nowrap; }
        .badge-v6 { font-size: 0.6rem; background: #2e1a5f; color: #a78bfa; border-radius: 3px; padding: 1px 5px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

<header class="site-header">
    <a href="/city-explore" class="back-link">← 国一覧へ</a>
    <span class="header-flag" id="headerFlag"></span>
    <div>
        <h1 id="headerTitle">読み込み中...</h1>
        <span class="h-en" id="headerTitleEn"></span>
    </div>
    <div class="header-spacer"></div>
    <input type="search" id="searchBox" placeholder="都市・IPで検索..." disabled>
    <div class="ip-ver-btns">
        <button class="ip-ver-btn act-all" id="fAll" onclick="setVerFilter('all')">全て</button>
        <button class="ip-ver-btn" id="fV4" onclick="setVerFilter('v4')">IPv4</button>
        <button class="ip-ver-btn" id="fV6" onclick="setVerFilter('v6')">IPv6</button>
    </div>
    <span class="stat-badge" id="statBadge">—</span>
</header>

<main class="main" id="main">
    <div class="notice-block loading" id="loadingBlock">
        <div><span class="spinner"></span><span id="loadingMsg" style="font-size:1rem;color:#94a3b8;">データを準備中...</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="notice-sub">GeoLite2-City をスキャン中です。初回のみ時間がかかります。</div>
    </div>
</main>

<script>
(function () {
    var countryCode = window.location.pathname.split('/').filter(Boolean).pop().toUpperCase();

    var JP_REGION_ORDER = [
        '北海道地方','東北地方','関東地方','中部地方',
        '近畿地方','中国地方','四国地方','九州・沖縄地方','その他'
    ];
    var JP_REGION_MAP = {
        'Hokkaido':'北海道地方',
        'Aomori':'東北地方','Iwate':'東北地方','Miyagi':'東北地方',
        'Akita':'東北地方','Yamagata':'東北地方','Fukushima':'東北地方',
        'Ibaraki':'関東地方','Tochigi':'関東地方','Gunma':'関東地方',
        'Saitama':'関東地方','Chiba':'関東地方','Tokyo':'関東地方','Kanagawa':'関東地方',
        'Niigata':'中部地方','Toyama':'中部地方','Ishikawa':'中部地方',
        'Fukui':'中部地方','Yamanashi':'中部地方','Nagano':'中部地方',
        'Gifu':'中部地方','Shizuoka':'中部地方','Aichi':'中部地方',
        'Mie':'近畿地方','Shiga':'近畿地方','Kyoto':'近畿地方',
        'Osaka':'近畿地方','Hyogo':'近畿地方','Nara':'近畿地方','Wakayama':'近畿地方',
        'Tottori':'中国地方','Shimane':'中国地方','Okayama':'中国地方',
        'Hiroshima':'中国地方','Yamaguchi':'中国地方',
        'Tokushima':'四国地方','Kagawa':'四国地方','Ehime':'四国地方','Kochi':'四国地方',
        'Fukuoka':'九州・沖縄地方','Saga':'九州・沖縄地方','Nagasaki':'九州・沖縄地方',
        'Kumamoto':'九州・沖縄地方','Oita':'九州・沖縄地方','Miyazaki':'九州・沖縄地方',
        'Kagoshima':'九州・沖縄地方','Okinawa':'九州・沖縄地方'
    };

    function flagEmoji(code) {
        if (!code || code.length !== 2) return '🌐';
        return String.fromCodePoint(
            0x1F1E6 + code.toUpperCase().charCodeAt(0) - 65,
            0x1F1E6 + code.toUpperCase().charCodeAt(1) - 65
        );
    }

    function safe(x) {
        return (x != null && x !== '') ? x : '—';
    }

    function showNotice(type, html) {
        var el = document.getElementById('loadingBlock');
        el.className = 'notice-block ' + type;
        el.innerHTML = html;
    }

    var prefBlocks = [];
    var ipVerFilter = 'all';

    function setVerFilter(v) {
        ipVerFilter = v;
        document.getElementById('fAll').className = 'ip-ver-btn' + (v === 'all' ? ' act-all' : '');
        document.getElementById('fV4').className  = 'ip-ver-btn' + (v === 'v4'  ? ' act-v4'  : '');
        document.getElementById('fV6').className  = 'ip-ver-btn' + (v === 'v6'  ? ' act-v6'  : '');
        document.querySelectorAll('tbody tr').forEach(function (tr) {
            if (v === 'all') { tr.classList.remove('hidden-ver'); }
            else { tr.classList.toggle('hidden-ver', tr.dataset.ipver !== v); }
        });
    }
    window.setVerFilter = setVerFilter;

    function buildTable(ips, showSubdivision) {
        var wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        var table = document.createElement('table');
        var headCols = '<th>IPアドレス</th><th>都市（日本語）</th><th>都市（英語）</th>';
        if (showSubdivision) headCols += '<th>州・県</th>';
        headCols += '<th>郵便番号</th><th>座標</th><th>タイムゾーン</th><th>精度</th><th>ASN</th><th>組織・ISP</th>';
        table.innerHTML = '<thead><tr>' + headCols + '</tr></thead>';
        var tbody = document.createElement('tbody');
        ips.forEach(function (e) {
            var tr = document.createElement('tr');
            var isV6 = e.ip && e.ip.indexOf(':') !== -1;
            tr.dataset.ipver = isV6 ? 'v6' : 'v4';
            if (ipVerFilter !== 'all' && tr.dataset.ipver !== ipVerFilter) {
                tr.classList.add('hidden-ver');
            }
            tr.dataset.s = [e.ip, e.city_ja, e.city_en, e.subdivision_ja,
                e.subdivision_en, e.organization, e.asn, e.postal_code, e.time_zone]
                .filter(Boolean).join(' ').toLowerCase();
            var coord = (e.latitude != null && e.longitude != null)
                ? e.latitude.toFixed(4) + ', ' + e.longitude.toFixed(4) : '—';
            var accStr = e.accuracy_radius_km != null ? '±' + e.accuracy_radius_km + ' km' : '—';
            var v6Badge = isV6 ? '<span class="badge-v6">IPv6</span>' : '';
            var prefCell = showSubdivision ? '<td class="td-pref">' + safe(e.subdivision_ja) + '</td>' : '';
            tr.innerHTML =
                '<td class="td-ip">' + e.ip + v6Badge + '</td>' +
                '<td class="td-city-ja">' + safe(e.city_ja) + '</td>' +
                '<td class="td-city-en">' + safe(e.city_en) + '</td>' +
                prefCell +
                '<td class="td-post">' + safe(e.postal_code) + '</td>' +
                '<td class="td-coord">' + coord + '</td>' +
                '<td class="td-tz">' + safe(e.time_zone) + '</td>' +
                '<td class="td-acc">' + accStr + '</td>' +
                '<td class="td-asn">' + safe(e.asn) + '</td>' +
                '<td class="td-org" title="' + (e.organization || '') + '">' + safe(e.organization) + '</td>';
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        wrap.appendChild(table);
        return wrap;
    }

    function buildPrefBlock(region, isJapan) {
        var block = document.createElement('div');
        block.className = 'pref-block';
        var header = document.createElement('div');
        header.className = 'pref-row';
        var showEn = region.name_en && region.name_en !== region.name_ja && region.name_en !== '(その他)';
        var enSpan = showEn ? '<span class="p-name-en">' + region.name_en + '</span>' : '';
        header.innerHTML =
            '<span class="p-arrow">▶</span>' +
            '<span class="p-name-ja">' + (region.name_ja || region.name_en) + '</span>' +
            enSpan +
            '<span class="p-spacer"></span>' +
            '<span class="p-badge">' + region.ips.length + ' IP</span>';
        var body = document.createElement('div');
        body.className = 'pref-body';
        var pb = { region: region, block: block, header: header, body: body, built: false };
        pb.buildIfNeeded = function () {
            if (!pb.built) {
                body.appendChild(buildTable(region.ips, !isJapan));
                pb.built = true;
            }
        };
        prefBlocks.push(pb);
        header.addEventListener('click', function () {
            var open = body.classList.toggle('open');
            header.classList.toggle('open', open);
            header.querySelector('.p-arrow').classList.toggle('open', open);
            if (open) pb.buildIfNeeded();
        });
        block.appendChild(header);
        block.appendChild(body);
        return block;
    }

    function renderJapan(data) {
        var main = document.getElementById('main');
        main.innerHTML = '';
        prefBlocks.length = 0;
        var groups = {};
        data.regions.forEach(function (region) {
            var g = JP_REGION_MAP[region.name_en] || 'その他';
            if (!groups[g]) groups[g] = [];
            groups[g].push(region);
        });
        JP_REGION_ORDER.forEach(function (regionName) {
            var prefs = groups[regionName];
            if (!prefs || prefs.length === 0) return;
            var divider = document.createElement('div');
            divider.className = 'region-divider';
            divider.innerHTML = regionName + ' <span class="region-divider-count">' + prefs.length + ' 都道府県</span>';
            main.appendChild(divider);
            prefs.forEach(function (pref) {
                main.appendChild(buildPrefBlock(pref, true));
            });
        });
        setupSearch();
    }

    function renderCountry(data) {
        var main = document.getElementById('main');
        main.innerHTML = '';
        prefBlocks.length = 0;
        data.regions.forEach(function (region) {
            main.appendChild(buildPrefBlock(region, false));
        });
        setupSearch();
    }

    function setupSearch() {
        var box = document.getElementById('searchBox');
        box.placeholder = 'IPv4/IPv6・都市・組織を検索...';
        box.addEventListener('input', function () {
            var q = this.value.trim().toLowerCase();
            if (!q) {
                prefBlocks.forEach(function (pb) { pb.block.classList.remove('hidden'); });
                document.querySelectorAll('tbody tr').forEach(function (tr) {
                    tr.classList.remove('hidden-row', 'hl');
                });
                setVerFilter(ipVerFilter);
                return;
            }
            prefBlocks.forEach(function (pb) {
                var hasMatch = pb.region.ips.some(function (e) {
                    return [e.ip, e.city_ja, e.city_en, e.subdivision_ja,
                        e.subdivision_en, e.organization, e.asn, e.postal_code]
                        .filter(Boolean).join(' ').toLowerCase().indexOf(q) !== -1;
                });
                if (hasMatch) {
                    pb.buildIfNeeded();
                    pb.body.classList.add('open');
                    pb.header.classList.add('open');
                    pb.header.querySelector('.p-arrow').classList.add('open');
                    pb.block.classList.remove('hidden');
                    pb.body.querySelectorAll('tbody tr').forEach(function (tr) {
                        var match = tr.dataset.s && tr.dataset.s.indexOf(q) !== -1;
                        tr.classList.toggle('hidden-row', !match);
                        tr.classList.toggle('hl', match);
                    });
                } else {
                    pb.block.classList.add('hidden');
                }
            });
        });
    }

    function showPage(data) {
        document.title = data.name_ja + ' — 国別IP ブラウザ';
        document.getElementById('headerFlag').textContent = flagEmoji(data.code);
        document.getElementById('headerTitle').textContent = data.name_ja;
        document.getElementById('headerTitleEn').textContent = data.name_en;
        document.getElementById('loadingBlock').style.display = 'none';
        var totalIps = data.regions.reduce(function (s, r) { return s + r.ips.length; }, 0);
        document.getElementById('statBadge').textContent = data.regions.length + ' 地域 / ' + totalIps + ' IP';
        document.getElementById('searchBox').disabled = false;
        if (countryCode === 'JP') { renderJapan(data); } else { renderCountry(data); }
    }

    function poll(callback) {
        function tick() {
            fetch('/api/city-explore/status')
                .then(function (r) { return r.json(); })
                .then(function (s) {
                    if (!s.dbLoaded) {
                        showNotice('error',
                            '<div style="font-size:1.4rem;margin-bottom:10px">⚠️</div>' +
                            '<div style="font-weight:700;margin-bottom:8px">GeoLite2 データベース未ロード</div>' +
                            '<div style="font-size:0.85rem;opacity:0.8;margin-bottom:14px">' +
                            'サーバーに <code style="background:#2d0808;padding:2px 6px;border-radius:4px">GEOLITE2_LICENSE_KEY</code> が設定されていないため利用できません。</div>' +
                            '<a href="/" style="color:#60a5fa;font-size:0.85rem;text-decoration:none">← トップへ戻る</a>'
                        );
                        document.getElementById('headerTitle').textContent = 'DB未ロード';
                        return;
                    }
                    document.getElementById('progressBar').style.width = s.progress + '%';
                    document.getElementById('loadingMsg').textContent = 'GeoLite2-City をスキャン中... ' + s.progress + '%';
                    if (s.ready) { callback(); return; }
                    setTimeout(tick, 900);
                })
                .catch(function () { setTimeout(tick, 1500); });
        }
        tick();
    }

    function loadCountry() {
        fetch('/api/city-explore/country/' + countryCode)
            .then(function (r) {
                if (!r.ok) {
                    showNotice('error',
                        '<div style="font-weight:700;margin-bottom:8px">⚠️ 国コード「' + countryCode + '」のデータが見つかりませんでした</div>' +
                        '<a href="/city-explore" style="color:#60a5fa;font-size:0.85rem;text-decoration:none">← 国一覧へ戻る</a>'
                    );
                    return null;
                }
                return r.json();
            })
            .then(function (data) {
                if (data) showPage(data);
            })
            .catch(function (e) {
                showNotice('error', '<div style="font-weight:700">データ取得エラー</div><div style="font-size:0.85rem;margin-top:6px">' + e.message + '</div>');
            });
    }

    fetch('/api/city-explore/status')
        .then(function (r) { return r.json(); })
        .then(function (s) {
            if (!s.dbLoaded) {
                showNotice('error',
                    '<div style="font-size:1.4rem;margin-bottom:10px">⚠️</div>' +
                    '<div style="font-weight:700;margin-bottom:8px">GeoLite2 データベース未ロード</div>' +
                    '<div style="font-size:0.85rem;opacity:0.8;margin-bottom:14px">' +
                    'サーバーに <code style="background:#2d0808;padding:2px 6px;border-radius:4px">GEOLITE2_LICENSE_KEY</code> が設定されていないため利用できません。</div>' +
                    '<a href="/" style="color:#60a5fa;font-size:0.85rem;text-decoration:none">← トップへ戻る</a>'
                );
                document.getElementById('headerTitle').textContent = 'DB未ロード';
            } else if (s.ready) {
                loadCountry();
            } else {
                poll(loadCountry);
            }
        })
        .catch(function () {
            showNotice('error', '<div style="font-weight:700">サーバーに接続できませんでした</div>');
        });
}());
</script>
</body>
</html>
